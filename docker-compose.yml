version: "3.9"

services:
  db:
    build: ./database
    image: drone-postgres:18
    container_name: postgres18
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin4_drone
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "True"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/login"]
      interval: 30s
      timeout: 10s
      retries: 5

  frontend:
    container_name: drone-frontend
    build: ./frontend
    image: drone-frontend:latest
    ports: "80:80"
    restart: unless-stopped
    env_file:
      - ./frontend/.env
    environment:
      VITE_WS_URL: ${VITE_WS_URL}
    networks:
      - default

volumes:
  postgres_data:
  pgadmin_data:

networks:
  default:
